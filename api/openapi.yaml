openapi: 3.0.3
info:
  contact:
    email: support@fideo.ai
  description: |-
    Fideo Intelligence offers an identity intelligence product that protects the public good.
    - [Fideo Privacy Policy](https://www.fideo.ai/privacy-policy/)
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://www.fideo.ai/terms-of-use/
  title: Fideo API
  version: 1.0.4
externalDocs:
  description: Getting Started with Fideo
  url: https://docs.fideo.ai/docs/getting-started
servers:
- url: https://api.fideo.ai/
security:
- bearerAuth: []
tags:
- description: Verify Signals
  externalDocs:
    description: Signals Documentation
    url: https://docs.fideo.ai/docs/signals
  name: signals
- description: Verify Match
  externalDocs:
    description: Verify Documentation
    url: https://docs.fideo.ai/docs/verify
  name: verify
- description: Beta Features
  externalDocs:
    description: Beta Features Documentation
    url: https://docs.fideo.ai/docs/beta
  name: beta
paths:
  /signals:
    post:
      parameters:
      - explode: true
        in: query
        name: v
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiFieldReqWithOptions"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_signals_post_200_response"
          description: Successful response
        "204":
          description: No data found
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Bad request
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Forbidden
        "410":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Claimed or deleted data
      tags:
      - signals
      x-content-type: application/json
      x-accepts:
      - application/json
  /verify:
    post:
      parameters:
      - explode: true
        in: query
        name: v
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiFieldReqWithOptions"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
          description: OK
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
          description: Created new verify session
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Bad request
        "410":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Claimed or deleted data
      tags:
      - verify
      x-content-type: application/json
      x-accepts:
      - application/json
  /beta/signals/patterns/summary:
    post:
      description: Returns summaries of ALL intervals (hour through year) for an email
        in the request
      operationId: getSignalPatternsSummary
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalPatternsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalPatternRecencyResponse"
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Bad request
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Forbidden
      summary: Get signal patterns summary
      tags:
      - beta
      x-content-type: application/json
      x-accepts:
      - application/json
  /beta/signals/patterns/timeseries:
    post:
      description: Returns timeseries details for signal patterns
      operationId: getSignalPatternsTimeseries
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalPatternsTimeseriesRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: "#/components/schemas/SignalPatternResponseUnit"
                type: object
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Bad request
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseWithMessage"
          description: Forbidden
      summary: Get signal patterns timeseries
      tags:
      - beta
      x-content-type: application/json
      x-accepts:
      - application/json
